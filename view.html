<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>武将データ一覧 - チーム編成ビュー</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a25;
            --bg-input: #22222f;
            --border-color: #2a2a3a;
            --border-accent: #4a3a2a;
            --text-primary: #e8e4dc;
            --text-secondary: #9a9490;
            --text-muted: #6a6560;
            --accent-gold: #c9a227;
            --accent-gold-dim: #8a7020;
            --accent-red: #b83c3c;
            --accent-green: #3cb878;
            --accent-blue: #3c8cb8;
            --status-complete: #2a6a4a;
            --status-partial: #6a5a2a;
            --status-empty: #4a2a2a;
            --shadow-glow: 0 0 30px rgba(201, 162, 39, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #1a1510 0%, #0a0a0f 100%);
            border-bottom: 2px solid var(--accent-gold-dim);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .header h1 {
            font-family: 'Zen Maru Gothic', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-gold);
            letter-spacing: 0.1em;
        }

        .header-actions {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .header-actions a,
        .header-actions select {
            padding: 0.5rem 1rem;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .header-actions a:hover,
        .header-actions select:hover {
            border-color: var(--accent-gold-dim);
        }

        /* Status area */
        .status-area {
            padding: 1rem 2rem;
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-size: 0.9rem;
            border-bottom: 1px solid var(--border-color);
        }

        .status-area .status-label {
            color: var(--accent-gold);
            font-weight: 500;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        /* Table wrapper: horizontal scroll */
        .table-wrapper {
            overflow: auto;
            max-height: calc(100vh - 180px);
            background: var(--bg-card);
            border-top: 1px solid var(--border-color);
        }

        /* Main view table */
        .view-table {
            border-collapse: separate;
            border-spacing: 0;
            font-size: 0.85rem;
            color: var(--text-primary);
            white-space: nowrap;
        }

        .view-table th,
        .view-table td {
            border: 1px solid var(--border-color);
            padding: 0.4rem 0.6rem;
            text-align: center;
            background: var(--bg-card);
        }

        /* Header rows */
        .view-table thead th {
            position: sticky;
            background: var(--bg-secondary);
            font-weight: 500;
            color: var(--text-primary);
        }

        .view-table thead tr:nth-child(1) th {
            top: 0;
            z-index: 3;
        }

        .view-table thead tr:nth-child(2) th {
            top: 36px;
            z-index: 3;
        }

        /* Category row cells */
        .cat-header {
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        /* Category color classes (applied to both header and body cells) */
        .view-table thead .cat-weapon  { background: #3a2a20 !important; color: #e8a878; }
        .view-table thead .cat-sp      { background: #3a2a3a !important; color: #d8a8d8; }
        .view-table thead .cat-general { background: #2a3a3a !important; color: #88c8c8; }
        .view-table thead .cat-academy { background: #3a3a20 !important; color: #d8d878; }
        .view-table thead .cat-asura   { background: #3a2020 !important; color: #e89090; }
        .view-table thead .cat-armor   { background: #2a2a3a !important; color: #9090e8; }
        .view-table thead .cat-flower  { background: #2a3a2a !important; color: #90d890; }
        .view-table thead .cat-horse   { background: #3a3520 !important; color: #d8c078; }
        .view-table thead .cat-tactic  { background: #20303a !important; color: #78c0e0; }

        /* Body cells use a slightly dimmer tint of the same category color */
        .view-table tbody td.cat-weapon  { background: #2a1f18; }
        .view-table tbody td.cat-sp      { background: #2a1f2a; }
        .view-table tbody td.cat-general { background: #1f2a2a; }
        .view-table tbody td.cat-academy { background: #2a2a18; }
        .view-table tbody td.cat-asura   { background: #2a1818; }
        .view-table tbody td.cat-armor   { background: #1f1f2a; }
        .view-table tbody td.cat-flower  { background: #1f2a1f; }
        .view-table tbody td.cat-horse   { background: #2a2618; }
        .view-table tbody td.cat-tactic  { background: #18242a; }

        /* Sticky left columns */
        .sticky-col {
            position: sticky;
            left: 0;
            z-index: 2;
            background: var(--bg-secondary);
            text-align: left;
            font-weight: 500;
        }

        .sticky-col-2 {
            left: 140px;
            z-index: 2;
        }

        /* Top-left corner cells (both sticky) */
        .view-table thead tr th.sticky-col {
            z-index: 4;
            background: var(--bg-secondary);
        }

        /* Body rows */
        .view-table tbody tr:hover td {
            background: #20202d;
        }

        .view-table tbody tr:hover td.sticky-col {
            background: #25253a;
        }

        /* Cell state symbols: ● equipped, ○ owned, blank none */
        .cell-equipped {
            color: var(--accent-green);
            font-size: 1.1rem;
            line-height: 1;
        }
        .cell-owned {
            color: var(--accent-gold);
            font-size: 1.1rem;
            line-height: 1;
        }
        .cell-none {
            color: transparent;
        }

        /* First user column width */
        .col-username { min-width: 140px; }
        .col-troop { min-width: 80px; }

        /* Category border enhancement - thicker border at category boundaries */
        .cat-border-left {
            border-left: 3px solid var(--accent-gold-dim) !important;
        }

        /* Asura level separator - dotted line between 30/60/90 groups */
        .asura-level-border {
            border-left: 2px dashed var(--text-muted) !important;
        }

        /* Category collapse toggle */
        .cat-header {
            cursor: pointer;
            user-select: none;
        }
        .cat-header:hover {
            filter: brightness(1.2);
        }
        .cat-toggle {
            margin-left: 0.3rem;
            font-size: 0.7rem;
            opacity: 0.7;
        }
        .collapsed-col {
            display: none !important;
        }
        .cat-collapsed-placeholder {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            padding: 0.5rem 0.3rem !important;
            font-size: 0.75rem;
            min-width: 30px;
            max-width: 30px;
            cursor: pointer;
        }
        .cat-collapsed-placeholder:hover {
            filter: brightness(1.2);
        }

        /* Scroll position indicator */
        .scroll-indicator {
            position: sticky;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            background: var(--bg-primary);
            border-bottom: 2px solid var(--accent-gold-dim);
            padding: 0.4rem 1rem;
            font-size: 0.85rem;
            color: var(--accent-gold);
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .scroll-indicator-item {
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.2s;
        }
        .scroll-indicator-item:hover {
            opacity: 0.8;
        }
        .scroll-indicator-item.active {
            opacity: 1;
            font-weight: 600;
        }

        /* Legend */
        .legend {
            padding: 0.5rem 2rem;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            font-size: 0.8rem;
            color: var(--text-secondary);
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .legend .cell-equipped,
        .legend .cell-owned,
        .legend .cell-none {
            margin-right: 0.3rem;
        }

        /* Clickable cells for status toggle */
        .cell-clickable {
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .cell-clickable:hover {
            transform: scale(1.1);
            box-shadow: 0 0 8px rgba(201, 162, 39, 0.4);
            z-index: 1;
            position: relative;
        }
        .cell-clickable:active {
            transform: scale(0.95);
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-card);
            border: 1px solid var(--accent-gold);
            border-radius: 8px;
            padding: 0.8rem 1.5rem;
            color: var(--text-primary);
            font-size: 0.9rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            opacity: 0;
            transition: transform 0.3s, opacity 0.3s;
            z-index: 1000;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        .toast.success {
            border-color: var(--accent-green);
        }
        .toast.error {
            border-color: var(--accent-red);
        }

        /* Comparison Section */
        .comparison-section {
            margin: 2rem;
            padding: 1.5rem;
            background: var(--bg-card);
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .comparison-section h4 {
            color: var(--accent-gold);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.1rem;
        }

        .user-selector {
            background: var(--bg-input);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        .user-selector h5 {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 0.8rem;
        }

        .user-checkbox-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            max-height: 200px;
            overflow-y: auto;
        }

        .user-checkbox-item {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            background: var(--bg-secondary);
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .user-checkbox-item:hover {
            border-color: var(--accent-gold-dim);
        }

        .user-checkbox-item.selected {
            border-color: var(--accent-gold);
            background: rgba(201, 162, 39, 0.1);
        }

        .user-checkbox-item input {
            accent-color: var(--accent-gold);
        }

        .user-checkbox-item label {
            font-size: 0.85rem;
            cursor: pointer;
        }

        .compare-btn {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            margin-top: 1rem;
            transition: all 0.2s ease;
        }

        .compare-btn:hover {
            background: #4a9cc8;
        }

        .compare-btn:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
        }

        .comparison-results {
            display: none;
        }

        .comparison-results.show {
            display: block;
        }

        .comparison-category {
            background: var(--bg-input);
            border-radius: 8px;
            margin-bottom: 1rem;
            overflow: hidden;
        }

        .comparison-category-header {
            padding: 0.8rem 1rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }

        .comparison-category-header.overlap {
            background: linear-gradient(90deg, rgba(184, 60, 60, 0.2) 0%, var(--bg-input) 100%);
            border-left: 3px solid var(--accent-red);
        }

        .comparison-category-header.unused {
            background: linear-gradient(90deg, rgba(60, 140, 184, 0.2) 0%, var(--bg-input) 100%);
            border-left: 3px solid var(--accent-blue);
        }

        .comparison-category-header.inconsistent {
            background: linear-gradient(90deg, rgba(201, 162, 39, 0.2) 0%, var(--bg-input) 100%);
            border-left: 3px solid var(--accent-gold);
        }

        .comparison-category-header h5 {
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .comparison-category-header .count {
            font-size: 0.8rem;
            padding: 0.2rem 0.6rem;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
        }

        .comparison-category-content {
            padding: 1rem;
            border-top: 1px solid var(--border-color);
            display: none;
        }

        .comparison-category-content.show {
            display: block;
        }

        .comparison-item {
            background: var(--bg-secondary);
            border-radius: 6px;
            padding: 0.8rem 1rem;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .comparison-item:last-child {
            margin-bottom: 0;
        }

        .comparison-item .item-name {
            font-weight: 500;
            min-width: 150px;
        }

        .comparison-item .item-type {
            font-size: 0.75rem;
            color: var(--text-muted);
            padding: 0.2rem 0.5rem;
            background: var(--bg-card);
            border-radius: 4px;
        }

        .comparison-item .users-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
        }

        .comparison-item .user-tag {
            font-size: 0.75rem;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            background: var(--accent-gold-dim);
            color: var(--text-primary);
        }

        .no-issues {
            text-align: center;
            padding: 2rem;
            color: var(--accent-green);
        }

        .no-issues .icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        /* Comparison Sub-categories */
        .comparison-subcategory {
            margin-bottom: 0.8rem;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .comparison-subcategory-header {
            padding: 0.6rem 1rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            user-select: none;
        }

        .comparison-subcategory-header .subcat-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
        }

        .comparison-subcategory-header .subcat-count {
            font-size: 0.75rem;
            padding: 0.1rem 0.5rem;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
        }

        .comparison-subcategory-content {
            padding: 0.8rem;
            display: none;
            border-top: 1px solid var(--border-color);
        }

        .comparison-subcategory-content.show {
            display: block;
        }

        /* Sub-category colors by type */
        .subcat-weapon {
            background: linear-gradient(90deg, rgba(184, 80, 60, 0.15) 0%, var(--bg-secondary) 100%);
            border-left: 3px solid #b85040;
        }
        .subcat-spgeneral {
            background: linear-gradient(90deg, rgba(201, 162, 39, 0.15) 0%, var(--bg-secondary) 100%);
            border-left: 3px solid var(--accent-gold);
        }
        .subcat-general {
            background: linear-gradient(90deg, rgba(100, 160, 100, 0.15) 0%, var(--bg-secondary) 100%);
            border-left: 3px solid #64a064;
        }
        .subcat-academy {
            background: linear-gradient(90deg, rgba(80, 140, 180, 0.15) 0%, var(--bg-secondary) 100%);
            border-left: 3px solid #508cb4;
        }
        .subcat-mask {
            background: linear-gradient(90deg, rgba(140, 100, 180, 0.15) 0%, var(--bg-secondary) 100%);
            border-left: 3px solid #8c64b4;
        }
        .subcat-flower {
            background: linear-gradient(90deg, rgba(220, 120, 160, 0.15) 0%, var(--bg-secondary) 100%);
            border-left: 3px solid #dc78a0;
        }
        .subcat-horse {
            background: linear-gradient(90deg, rgba(160, 120, 80, 0.15) 0%, var(--bg-secondary) 100%);
            border-left: 3px solid #a07850;
        }
        .subcat-tactic {
            background: linear-gradient(90deg, rgba(60, 140, 184, 0.15) 0%, var(--bg-secondary) 100%);
            border-left: 3px solid var(--accent-blue);
        }
        .subcat-asura {
            background: linear-gradient(90deg, rgba(180, 60, 60, 0.15) 0%, var(--bg-secondary) 100%);
            border-left: 3px solid #b43c3c;
        }

        .comparison-subcategory .comparison-item {
            margin-bottom: 0.4rem;
            padding: 0.6rem 0.8rem;
        }

        .selected-users-display {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.8rem;
            padding-top: 0.8rem;
            border-top: 1px solid var(--border-color);
        }

        .team-auto-select {
            margin-bottom: 1rem;
            padding: 0.8rem;
            background: var(--bg-secondary);
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .team-auto-select label {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .team-auto-select button {
            padding: 0.4rem 0.8rem;
            background: var(--accent-gold-dim);
            border: none;
            border-radius: 4px;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.85rem;
        }

        .team-auto-select button:hover {
            filter: brightness(1.1);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>武将データ一覧 - チーム編成ビュー</h1>
        <div class="header-actions">
            <select id="teamFilter">
                <option value="__all__">全ユーザー</option>
            </select>
            <a href="index.html">← 入力画面へ戻る</a>
        </div>
    </div>

    <div class="status-area">
        <span class="status-label">状態:</span>
        <span id="statusText">Firebase接続中...</span>
    </div>

    <div class="legend">
        <span><span class="cell-equipped">●</span> 装備/編成中</span>
        <span><span class="cell-owned">○</span> 所持のみ</span>
        <span>（空欄）未所持</span>
        <span style="margin-left: 1rem; color: var(--text-muted);">※ ●/○ をクリックで切り替え可能</span>
    </div>

    <div id="mainContent">
        <div class="loading">データを読み込んでいます...</div>
    </div>

    <!-- Comparison Section -->
    <div class="comparison-section" id="comparisonSection">
        <h4>📊 ユーザー比較分析</h4>

        <div class="user-selector">
            <div class="team-auto-select">
                <label>チームから選択:</label>
                <select id="comparisonTeamSelect">
                    <option value="">選択してください</option>
                </select>
                <button onclick="loadTeamMembers()">メンバーを読み込む</button>
                <button onclick="clearSelectedUsers()">全解除</button>
            </div>
            <h5>比較するユーザーを選択（最大10人）</h5>
            <div class="user-checkbox-grid" id="userCheckboxGrid">
                <!-- Populated by JS -->
            </div>
            <div class="selected-users-display" id="selectedUsersDisplay">
                <!-- Selected users shown here -->
            </div>
            <button class="compare-btn" id="compareBtn" onclick="runComparison()" disabled>比較分析を実行 (2人以上選択してください)</button>
        </div>

        <div class="comparison-results" id="comparisonResults">
            <!-- Overlap Section -->
            <div class="comparison-category" id="overlapCategory">
                <div class="comparison-category-header overlap" onclick="toggleComparisonCategory('overlapCategory')">
                    <h5>
                        <span>📋</span>
                        編成/装備中の項目
                        <span class="count" id="overlapCount">0件</span>
                    </h5>
                    <span class="toggle-icon">▼</span>
                </div>
                <div class="comparison-category-content" id="overlapContent">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- Unused Section -->
            <div class="comparison-category" id="unusedCategory">
                <div class="comparison-category-header unused" onclick="toggleComparisonCategory('unusedCategory')">
                    <h5>
                        <span>❓</span>
                        誰も装備していない項目
                        <span class="count" id="unusedCount">0件</span>
                    </h5>
                    <span class="toggle-icon">▼</span>
                </div>
                <div class="comparison-category-content" id="unusedContent">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- Inconsistent Section -->
            <div class="comparison-category" id="inconsistentCategory">
                <div class="comparison-category-header inconsistent" onclick="toggleComparisonCategory('inconsistentCategory')">
                    <h5>
                        <span>📦</span>
                        所持しているが未装備の項目
                        <span class="count" id="inconsistentCount">0件</span>
                    </h5>
                    <span class="toggle-icon">▼</span>
                </div>
                <div class="comparison-category-content" id="inconsistentContent">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getDatabase, ref, get, set, update, onValue } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";

        const firebaseConfig = {

        // Build general categories dynamically (merge custom generals into matching categories)
        function buildGeneralCategories() {
            const customRaw = (customGenerals && typeof customGenerals === 'object' && !Array.isArray(customGenerals))
                ? customGenerals
                : { _default: Array.isArray(customGenerals) ? customGenerals : [] };

            const cats = generalCategories.map((gc, i) => {
                const matchingCustom = Array.isArray(customRaw[gc.title]) ? customRaw[gc.title] : [];
                const combinedItems = [...gc.generals, ...matchingCustom].map(name => ({ id: name, name }));
                return {
                    key: `general_${i}`,
                    title: `②-2 ${gc.title}`,
                    colorClass: 'cat-general',
                    items: combinedItems,
                    getCellState: (user, item) => getGeneralCellState(user, item.id)
                };
            });

            // Collect unmatched custom subcategories
            const existingTitles = new Set(generalCategories.map(c => c.title));
            const customSubcats = Object.keys(customRaw).filter(k => !existingTitles.has(k) && Array.isArray(customRaw[k]) && customRaw[k].length > 0);
            customSubcats.sort((a, b) => {
                if (a === '_default') return 1;
                if (b === '_default') return -1;
                return a.localeCompare(b);
            });

            customSubcats.forEach((subcat, idx) => {
                const names = customRaw[subcat] || [];
                const displayTitle = subcat === '_default' ? '追加武将' : subcat;
                cats.push({
                    key: `general_custom_${idx}`,
                    title: `②-2 ${displayTitle}`,
                    colorClass: 'cat-general',
                    items: names.map(name => ({ id: name, name })),
                    getCellState: (user, item) => getGeneralCellState(user, item.id)
                });
            });

            return cats;
        }

                if (Array.isArray(itemList)) {
                    itemList.forEach(name => items.push(name));
                }
            });
            return items;
        }

        function getAllCategories() {

        function escapeHtml(str) {
            return String(str).replace(/[&<>"']/g, c => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[c]));
        }

        // Toast notification
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type + ' show';
            setTimeout(() => { toast.className = 'toast'; }, 2500);
        }

        // Scroll position preservation
        let pendingScrollRestore = null;

        function saveScrollPosition() {
            const wrapper = document.getElementById('tableWrapper');
            if (wrapper) {
                pendingScrollRestore = { left: wrapper.scrollLeft, top: wrapper.scrollTop };
            }
        }

        function restoreScrollPosition() {
            if (pendingScrollRestore) {
                const wrapper = document.getElementById('tableWrapper');
                if (wrapper) {
                    wrapper.scrollLeft = pendingScrollRestore.left;
                    wrapper.scrollTop = pendingScrollRestore.top;
                }
                pendingScrollRestore = null;
            }
        }

        // Toggle cell state between equipped ⇄ owned
        async function toggleCellState(username, catKey, itemId, itemData) {
            if (!window.firebaseReady) {
                showToast('Firebase未接続', 'error');
                return;
            }

            const user = gameData[username];
            if (!user) return;

            const { database, ref, set, update } = window.firebaseDB;

            // Save scroll position before update
            saveScrollPosition();

            try {
                let path, updateData, stateText;

                // Check if this is a custom item (merged into base category)
                const isCustom = itemData?.isCustom === true;

                // Handle different category types
                if (catKey === 'weapon') {
                    if (isCustom) {
                        const w = user.customItems?.weapons?.[itemId];
                        if (!w?.status || w.status === '') return;
                        const newStatus = w.status === 'equipped' ? 'owned' : 'equipped';
                        path = `gameData/${username}/customItems/weapons/${itemId}/status`;
                        await set(ref(database, path), newStatus);
                        stateText = newStatus === 'equipped' ? '装備中' : '所持のみ';
                    } else {
                        const current = user.weapons?.[itemId]?.status;
                        if (!current || current === '') return;
                        const newStatus = current === 'equipped' ? 'owned' : 'equipped';
                        path = `gameData/${username}/weapons/${itemId}/status`;
                        await set(ref(database, path), newStatus);
                        stateText = newStatus === 'equipped' ? '装備中' : '所持のみ';
                    }
                }
                else if (catKey === 'spGeneral') {
                    if (isCustom) {
                        const sp = user.customItems?.spGenerals?.[itemId];
                        if (!sp?.owned && !sp?.formed) return;
                        const newFormed = !sp.formed;
                        path = `gameData/${username}/customItems/spGenerals/${itemId}`;
                        await update(ref(database, path), { formed: newFormed, owned: true });
                        stateText = newFormed ? '装備中' : '所持のみ';
                    } else {
                        const sp = user.spGenerals?.[itemId];
                        if (!sp?.owned && !sp?.formed) return;
                        const newFormed = !sp.formed;
                        path = `gameData/${username}/spGenerals/${itemId}`;
                        await update(ref(database, path), { formed: newFormed, owned: true });
                        stateText = newFormed ? '装備中' : '所持のみ';
                    }
                }
                else if (catKey.startsWith('general_')) {
                    const g = user.generals?.[itemId];
                    if (!g?.owned && !g?.formed) return;
                    const newFormed = !g.formed;
                    path = `gameData/${username}/generals/${itemId}`;
                    await update(ref(database, path), { formed: newFormed, owned: true });
                    stateText = newFormed ? '装備中' : '所持のみ';
                }
                else if (catKey === 'academy') {
                    if (isCustom) {
                        const a = user.customItems?.academy?.[itemId];
                        if (!a?.owned && !a?.equipped) return;
                        const newEquipped = !a.equipped;
                        path = `gameData/${username}/customItems/academy/${itemId}`;
                        await update(ref(database, path), { equipped: newEquipped, owned: true });
                        stateText = newEquipped ? '装備中' : '所持のみ';
                    } else {
                        const h = user.academy?.heiho?.[itemId];
                        if (!h?.owned && !h?.equipped) return;
                        const newEquipped = !h.equipped;
                        path = `gameData/${username}/academy/heiho/${itemId}`;
                        await update(ref(database, path), { equipped: newEquipped, owned: true });
                        stateText = newEquipped ? '装備中' : '所持のみ';
                    }
                }
                else if (catKey === 'asura') {
                    if (isCustom) {
                        // Custom asura - use item name as key
                        const itemName = itemData?.name || itemId;
                        const a = user.customItems?.asura?.[itemName];
                        const newChecked = !(a?.checked);
                        path = `gameData/${username}/customItems/asura/${itemName}/checked`;
                        await set(ref(database, path), newChecked);
                        stateText = newChecked ? '選択' : '解除';
                    } else {
                        // Parse itemId like 'asura30_0' to get group and index
                        const match = itemId.match(/^asura(\d+)_(\d+)$/);
                        if (!match) return;
                        const level = match[1]; // '30', '60', or '90'
                        const index = parseInt(match[2]);
                        const groupKey = `skills${level}`;

                        const a = user.asura;
                        if (!a) return;

                        const skills = a[groupKey] || [];
                        const currentlySelected = skills[index] === true;

                        // Build new skills array: toggle clicked, deselect others in same level
                        const groupSize = level === '30' ? 3 : 5;
                        const newSkills = [];
                        for (let i = 0; i < groupSize; i++) {
                            if (i === index) {
                                newSkills[i] = !currentlySelected; // Toggle clicked skill
                            } else {
                                newSkills[i] = false; // Deselect others in same level
                            }
                        }

                        path = `gameData/${username}/asura/${groupKey}`;
                        await set(ref(database, path), newSkills);
                        stateText = !currentlySelected ? '選択' : '解除';
                    }
                }
                else if (catKey === 'armor') {
                    if (isCustom) {

                        const newEquipped = !m.equipped;

                        stateText = newEquipped ? '装備中' : '所持のみ';
                    } else {
                        const m = user.armor?.masks?.[itemId];
                        if (!m?.owned && !m?.equipped) return;
                        const newEquipped = !m.equipped;
                        path = `gameData/${username}/armor/masks/${itemId}`;
                        await update(ref(database, path), { equipped: newEquipped, owned: true });
                        stateText = newEquipped ? '装備中' : '所持のみ';
                    }
                }
                else if (catKey === 'flower') {
                    if (isCustom) {

                        if (!f?.owned && !f?.equipped) return;
                        const newEquipped = !f.equipped;

                        await update(ref(database, path), { equipped: newEquipped, owned: true });
                        stateText = newEquipped ? '装備中' : '所持のみ';
                    } else {
                        const f = user.flowers?.[itemId];
                        if (!f?.owned && !f?.equipped) return;
                        const newEquipped = !f.equipped;
                        path = `gameData/${username}/flowers/${itemId}`;
                        await update(ref(database, path), { equipped: newEquipped, owned: true });
                        stateText = newEquipped ? '装備中' : '所持のみ';
                    }
                }
                else if (catKey === 'tactic') {
                    if (isCustom) {
                        const t = user.customItems?.tactics?.[itemId];
                        if (!t?.owned && !t?.equipped) return;
                        const newEquipped = !t.equipped;
                        path = `gameData/${username}/customItems/tactics/${itemId}`;
                        await update(ref(database, path), { equipped: newEquipped, owned: true });
                        stateText = newEquipped ? '装備中' : '所持のみ';
                    } else {
                        const t = user.tactics?.[itemId];
                        if (!t?.owned && !t?.equipped) return;
                        const newEquipped = !t.equipped;
                        path = `gameData/${username}/tactics/${itemId}`;
                        await update(ref(database, path), { equipped: newEquipped, owned: true });
                        stateText = newEquipped ? '装備中' : '所持のみ';
                    }
                }
                // Legacy custom item handlers (keeping for backwards compatibility)
                else if (catKey === 'custom_academy') {
                    const a = user.customItems?.academy?.[itemId];
                    if (!a?.owned && !a?.equipped) return;
                    const newEquipped = !a.equipped;
                    path = `gameData/${username}/customItems/academy/${itemId}`;
                    await update(ref(database, path), { equipped: newEquipped, owned: true });
                    stateText = newEquipped ? '装備中' : '所持のみ';
                }
                else if (catKey === 'custom_weapon') {
                    const w = user.customItems?.weapons?.[itemId];
                    if (!w?.status || w.status === '') return;
                    const newStatus = w.status === 'equipped' ? 'owned' : 'equipped';
                    path = `gameData/${username}/customItems/weapons/${itemId}/status`;
                    await set(ref(database, path), newStatus);
                    stateText = newStatus === 'equipped' ? '装備中' : '所持のみ';
                }
                else if (catKey === 'custom_mask') {
                    const m = user.customItems?.masks?.[itemId];
                    if (!m?.owned && !m?.equipped) return;
                    const newEquipped = !m.equipped;
                    path = `gameData/${username}/customItems/masks/${itemId}`;
                    await update(ref(database, path), { equipped: newEquipped, owned: true });
                    stateText = newEquipped ? '装備中' : '所持のみ';
                }
                else if (catKey === 'custom_flower') {
                    const f = user.customItems?.flowers?.[itemId];
                    if (!f?.owned && !f?.equipped) return;
                    const newEquipped = !f.equipped;
                    path = `gameData/${username}/customItems/flowers/${itemId}`;
                    await update(ref(database, path), { equipped: newEquipped, owned: true });
                    stateText = newEquipped ? '装備中' : '所持のみ';
                }
                else if (catKey === 'custom_tactic') {
                    const t = user.customItems?.tactics?.[itemId];
                    if (!t?.owned && !t?.equipped) return;
                    const newEquipped = !t.equipped;
                    path = `gameData/${username}/customItems/tactics/${itemId}`;
                    await update(ref(database, path), { equipped: newEquipped, owned: true });
                    stateText = newEquipped ? '装備中' : '所持のみ';
                }
                else if (catKey === 'custom_asura') {
                    const a = user.customItems?.asura?.[itemId];
                    const newChecked = !(a?.checked);
                    path = `gameData/${username}/customItems/asura/${itemId}/checked`;
                    await set(ref(database, path), newChecked);
                    stateText = newChecked ? '選択' : '解除';
                }
                else {
                    return;
                }

                showToast(`${username}: ${itemId} → ${stateText}`, 'success');

            } catch (err) {
                console.error('Toggle error:', err);
                showToast('更新エラー: ' + err.message, 'error');
                pendingScrollRestore = null;
            }
        }

        function renderTable() {
            const main = document.getElementById('mainContent');
            const usernames = getVisibleUsernames();
            if (usernames.length === 0) {
                main.innerHTML = '<div class="loading">表示対象のユーザーがいません</div>';
                return;
            }

            // Get all categories including dynamic generals
            const allCats = getAllCategories();

            // Build scroll indicator
            const scrollIndicator = allCats.map(cat => {
                const shortTitle = cat.title.replace(/^②-2\s*/, '').substring(0, 8);
                return `<span class="scroll-indicator-item ${cat.colorClass}" onclick="scrollToCategory('${cat.key}')" data-cat-indicator="${cat.key}">${escapeHtml(shortTitle)}</span>`;
            }).join('');

            // Build category header row
            const catRowCells = allCats.map((cat, catIdx) => {
                const borderClass = catIdx > 0 ? ' cat-border-left' : '';
                const isCollapsed = collapsedCategories.has(cat.key);
                const toggleIcon = isCollapsed ? '▶' : '▼';

                if (isCollapsed) {
                    return `<th class="cat-header cat-collapsed-placeholder ${cat.colorClass}${borderClass}" data-cat-key="${cat.key}" onclick="toggleCategory('${cat.key}')" rowspan="2">${escapeHtml(cat.title.substring(0, 6))}…</th>`;
                }
                return `<th class="cat-header ${cat.colorClass}${borderClass}" data-cat-key="${cat.key}" onclick="toggleCategory('${cat.key}')" colspan="${cat.items.length}">${escapeHtml(cat.title)}<span class="cat-toggle">${toggleIcon}</span></th>`;
            }).join('');

            // Build item header row (skip collapsed categories)
            const itemRowCells = allCats.flatMap((cat, catIdx) => {
                if (collapsedCategories.has(cat.key)) return [];
                return cat.items.map((item, itemIdx) => {
                    let borderClass = (catIdx > 0 && itemIdx === 0) ? ' cat-border-left' : '';
                    // Add dotted border between asura level groups
                    if (item.id === 'asura60_0' || item.id === 'asura90_0') {
                        borderClass += ' asura-level-border';
                    }
                    return `<th class="${cat.colorClass}${borderClass}">${escapeHtml(item.name)}</th>`;
                });
            }).join('');

            // Build body rows
            const bodyRows = usernames.map(username => {
                const user = gameData[username] || {};
                const troop = user.troopType || '-';
                const dataCells = allCats.flatMap((cat, catIdx) => {
                    const isCollapsed = collapsedCategories.has(cat.key);
                    if (isCollapsed) {
                        const borderClass = catIdx > 0 ? ' cat-border-left' : '';
                        return [`<td class="cat-collapsed-placeholder ${cat.colorClass}${borderClass}"></td>`];
                    }
                    return cat.items.map((item, itemIdx) => {
                        const state = cat.getCellState(user, item);
                        let borderClass = (catIdx > 0 && itemIdx === 0) ? ' cat-border-left' : '';
                        // Add dotted border between asura level groups
                        if (item.id === 'asura60_0' || item.id === 'asura90_0') {
                            borderClass += ' asura-level-border';
                        }
                        // Asura: all cells clickable (radio-like selection within level)
                        // Others: only equipped/owned cells clickable
                        const isClickable = cat.key === 'asura' || (state === 'equipped' || state === 'owned');
                        const clickClass = isClickable ? ' cell-clickable' : '';
                        const itemIdStr = item.id || item.name || '';
                        const itemDataStr = JSON.stringify({ isCustom: !!item.isCustom, name: item.name || '' }).replace(/'/g, "\\'");
                        const clickHandler = isClickable
                            ? ` onclick="toggleCellState('${escapeHtml(username)}', '${cat.key}', '${escapeHtml(itemIdStr)}', ${itemDataStr})"`
                            : '';
                        return `<td class="${cat.colorClass}${borderClass}${clickClass}"${clickHandler}>${stateSymbol(state)}</td>`;
                    });
                }).join('');
                return `
                    <tr>
                        <td class="sticky-col col-username">${escapeHtml(username)}</td>
                        <td class="sticky-col sticky-col-2 col-troop">${escapeHtml(troop)}</td>
                        ${dataCells}
                    </tr>
                `;
            }).join('');

            main.innerHTML = `
                <div class="scroll-indicator">
                    <span style="color: var(--text-secondary); font-size: 0.7rem;">カテゴリ:</span>
                    ${scrollIndicator}
                </div>
                <div class="table-wrapper" id="tableWrapper">
                    <table class="view-table">
                        <thead>
                            <tr>
                                <th class="sticky-col col-username" rowspan="2">ユーザー</th>
                                <th class="sticky-col sticky-col-2 col-troop" rowspan="2">兵種</th>
                                ${catRowCells}
                            </tr>
                            <tr>
                                ${itemRowCells}
                            </tr>
                        </thead>
                        <tbody>
                            ${bodyRows}
                        </tbody>
                    </table>
                </div>
            `;

            // Setup scroll observer for indicator highlighting
            setupScrollObserver();

            // Restore scroll position if toggle was performed
            restoreScrollPosition();
        }

        function setupScrollObserver() {
            const wrapper = document.getElementById('tableWrapper');
            if (!wrapper) return;

            wrapper.addEventListener('scroll', () => {
                const headers = wrapper.querySelectorAll('[data-cat-key]');
                const wrapperRect = wrapper.getBoundingClientRect();
                let activeKey = null;

                headers.forEach(th => {
                    const rect = th.getBoundingClientRect();
                    if (rect.left <= wrapperRect.left + 250 && rect.right > wrapperRect.left + 220) {
                        activeKey = th.dataset.catKey;
                    }
                });

                document.querySelectorAll('.scroll-indicator-item').forEach(el => {
                    el.classList.toggle('active', el.dataset.catIndicator === activeKey);
                });
            });
        }

        let selectedUsers = [];

        function populateComparisonTeamSelect() {
            const sel = document.getElementById('comparisonTeamSelect');
            sel.innerHTML = '<option value="">選択してください</option>';
            Object.values(teams).forEach(t => {
                const opt = document.createElement('option');
                opt.value = t.id;
                opt.textContent = `${t.name} (${(t.members || []).length}人)`;
                sel.appendChild(opt);

        function loadTeamMembers() {
            const teamId = document.getElementById('comparisonTeamSelect').value;
            if (!teamId) {
                showToast('チームを選択してください', 'error');
                return;
            }
            const team = teams[teamId];
            if (!team) return;

            const members = (team.members || []).filter(u => gameData[u]);
            if (members.length === 0) {
                showToast('このチームにメンバーがいません', 'error');
                return;
            }

            // Clear and add team members (max 10)
            selectedUsers = members.slice(0, 10);
            refreshUserCheckboxGrid();
            updateCompareButton();
            showToast(`${team.name}のメンバー${selectedUsers.length}人を選択しました`, 'success');
        }

        function clearSelectedUsers() {
            selectedUsers = [];
            refreshUserCheckboxGrid();
            updateCompareButton();
        }

        function refreshUserCheckboxGrid() {
            const grid = document.getElementById('userCheckboxGrid');
            const allUsers = Object.keys(gameData).sort();

            if (allUsers.length === 0) {
                grid.innerHTML = '<span style="color: var(--text-muted);">保存されたユーザーがありません</span>';
                return;
            }

            grid.innerHTML = allUsers.map(name => `
                <label class="user-checkbox-item ${selectedUsers.includes(name) ? 'selected' : ''}">
                    <input type="checkbox" ${selectedUsers.includes(name) ? 'checked' : ''} onchange="toggleUserSelection('${escapeHtml(name)}', this.checked)">
                    <span>${escapeHtml(name)}</span>
                </label>
            `).join('');
        }

        function toggleUserSelection(username, checked) {
            if (checked && !selectedUsers.includes(username)) {
                if (selectedUsers.length >= 10) {
                    showToast('最大10人まで選択できます', 'error');
                    refreshUserCheckboxGrid();
                    return;
                }
                selectedUsers.push(username);
            } else {
                selectedUsers = selectedUsers.filter(u => u !== username);
            }
            updateCompareButton();
            refreshUserCheckboxGrid();
        }

        function updateCompareButton() {
            const btn = document.getElementById('compareBtn');
            const display = document.getElementById('selectedUsersDisplay');

            if (selectedUsers.length >= 2) {
                btn.disabled = false;
                btn.textContent = `比較分析を実行 (${selectedUsers.length}人選択中)`;
            } else {
                btn.disabled = true;
                btn.textContent = '比較分析を実行 (2人以上選択してください)';
            }

            display.innerHTML = selectedUsers.length > 0
                ? `<span style="color: var(--accent-gold);">選択中: ${selectedUsers.join(', ')}</span>`
                : '';
        }

        function getEquippableItems() {
            const items = [];

            // Weapons
            ['赤鬼', '隕石', '般若'].forEach((name, i) => {
                items.push({ id: ['akoni', 'inseki', 'hanya'][i], name, type: '兵器', category: 'weapon' });
            });

            // SP Generals
            const spGeneralNames = { nobunaga: 'SP織田信長', hideyoshi: 'SP豊臣秀吉', ieyasu: 'SP徳川家康' };
            Object.entries(spGeneralNames).forEach(([id, name]) => {
                items.push({ id, name, type: 'SP武将', category: 'spgeneral' });
            });

            // Regular Generals (merge custom generals into matching categories)
            const customRaw = (customGenerals && typeof customGenerals === 'object' && !Array.isArray(customGenerals))
                ? customGenerals
                : { _default: Array.isArray(customGenerals) ? customGenerals : [] };

            let globalIndex = 0;
            generalCategories.forEach((cat, catIndex) => {
                cat.generals.forEach((name) => {
                    items.push({
                        id: `general_${globalIndex}`, name, type: '武将', category: 'general',
                        index: globalIndex, generalName: name, subcategory: cat.title, subcategoryIndex: catIndex
                    });
                    globalIndex++;
                });
                // Add matching custom generals to this category
                const matchingCustom = Array.isArray(customRaw[cat.title]) ? customRaw[cat.title] : [];
                matchingCustom.forEach((name) => {
                    items.push({
                        id: `general_${globalIndex}`, name, type: '武将', category: 'general',
                        index: globalIndex, generalName: name, subcategory: cat.title, subcategoryIndex: catIndex
                    });
                    globalIndex++;
                });
            });

            // Unmatched custom subcategories
            const existingTitles = new Set(generalCategories.map(c => c.title));
            const customSubcats = Object.keys(customRaw).filter(k => !existingTitles.has(k) && Array.isArray(customRaw[k]) && customRaw[k].length > 0);
            customSubcats.sort((a, b) => {
                if (a === '_default') return 1;
                if (b === '_default') return -1;
                return a.localeCompare(b);
            });
            customSubcats.forEach((subcat, idx) => {
                const displayTitle = subcat === '_default' ? '追加武将' : subcat;
                (customRaw[subcat] || []).forEach((name) => {
                    items.push({
                        id: `general_${globalIndex}`, name, type: '武将', category: 'general',
                        index: globalIndex, generalName: name, subcategory: displayTitle, subcategoryIndex: generalCategories.length + idx
                    });
                    globalIndex++;
                });

            // Academy
            academyHeihoItems.forEach(h => {
                items.push({ id: h.id, name: h.name, type: '極伝兵法', category: 'academy' });
            });

            // Masks
            armorMaskItems.forEach(m => {
                items.push({ id: m.id, name: m.name, type: '核心具足', category: 'mask' });
            });

            // Flowers
            flowerItems.forEach(f => {
                items.push({ id: f.id, name: f.name, type: '花陣', category: 'flower' });
            });

            // Tactics
            tacticItems.forEach(t => {
                items.push({ id: t.id, name: t.name, type: '戦法', category: 'tactic' });
            });

            // Asura skills
            const asura30 = ['厄憑', '金剛の鎧', '稲田巡礼'];
            const asura60 = ['移花接木', '攻守転換', '風助火勢', '俊敏狡猾', '守攻転換'];
            const asura90 = ['破心断骨', '適時出撃', '麒麟の清め', '隠刃', '血戮'];

            asura30.forEach((name, i) => {
                items.push({ id: `asura30_${i}`, name, type: '阿修羅30', category: 'asura', subcategory: 'asura30', index: i });
            });
            asura60.forEach((name, i) => {
                items.push({ id: `asura60_${i}`, name, type: '阿修羅60', category: 'asura', subcategory: 'asura60', index: i });
            });
            asura90.forEach((name, i) => {
                items.push({ id: `asura90_${i}`, name, type: '阿修羅90', category: 'asura', subcategory: 'asura90', index: i });
            });

            // Custom items
            const customWeaponsList = getCustomItemsList('兵器');
            customWeaponsList.forEach(name => {
                items.push({ id: name, name, type: '兵器(カスタム)', category: 'custom_weapon' });
            });

            const customAcademyList = getCustomItemsList('極伝兵法');
            customAcademyList.forEach(name => {
                items.push({ id: name, name, type: '極伝兵法(カスタム)', category: 'custom_academy' });
            });

            const customMasksList = getCustomItemsList('核心具足');

                items.push({ id: name, name, type: '核心具足(カスタム)', category: 'custom_mask' });

                items.push({ id: name, name, type: '花陣(カスタム)', category: 'custom_flower' });

            customTacticsList.forEach(name => {
                items.push({ id: name, name, type: '戦法(カスタム)', category: 'custom_tactic' });
            });

            const customAsuraList = getCustomItemsList('阿修羅');
            customAsuraList.forEach(name => {
                items.push({ id: name, name, type: '阿修羅(カスタム)', category: 'custom_asura' });

        function getItemStatus(data, item) {
            let equipped = false;
            let owned = false;

            switch (item.category) {
                case 'weapon':
                    const weaponData = data?.weapons?.[item.id];
                    equipped = weaponData?.status === 'equipped';
                    owned = weaponData?.status === 'owned' || weaponData?.status === 'equipped';
                    break;
                case 'spgeneral':
                    const spData = data?.spGenerals?.[item.id];
                    equipped = spData?.formed || false;
                    owned = spData?.owned || false;
                    break;
                case 'general':
                    const generalData = data?.generals?.[item.generalName];
                    if (generalData && typeof generalData === 'object') {
                        equipped = generalData.formed || false;
                        owned = generalData.owned || false;
                    }
                    break;
                case 'academy':
                    const heihoData = data?.academy?.heiho?.[item.id];
                    equipped = heihoData?.equipped || false;
                    owned = heihoData?.owned || false;
                    break;
                case 'mask':
                    const maskData = data?.armor?.masks?.[item.id];
                    equipped = maskData?.equipped || false;
                    owned = maskData?.owned || false;
                    break;
                case 'flower':
                    const flowerData = data?.flowers?.[item.id];
                    equipped = flowerData?.equipped || false;
                    owned = flowerData?.owned || false;
                    break;
                case 'tactic':
                    const tacticData = data?.tactics?.[item.id];
                    equipped = tacticData?.equipped || false;
                    owned = tacticData?.owned || false;
                    break;
                case 'asura':
                    if (item.subcategory === 'asura30') {
                        equipped = data?.asura?.skills30?.[item.index] || false;
                    } else if (item.subcategory === 'asura60') {
                        equipped = data?.asura?.skills60?.[item.index] || false;
                    } else if (item.subcategory === 'asura90') {
                        equipped = data?.asura?.skills90?.[item.index] || false;
                    }
                    owned = equipped;
                    break;
                case 'custom_weapon':
                    const customWeaponData = data?.customItems?.weapons?.[item.id];
                    equipped = customWeaponData?.status === 'equipped';
                    owned = customWeaponData?.status === 'owned' || customWeaponData?.status === 'equipped';
                    break;
                case 'custom_academy':
                    const customAcademyData = data?.customItems?.academy?.[item.id];
                    equipped = customAcademyData?.equipped || false;
                    owned = customAcademyData?.owned || false;
                    break;
                case 'custom_mask':
                    const customMaskData = data?.customItems?.masks?.[item.id];
                    equipped = customMaskData?.equipped || false;
                    owned = customMaskData?.owned || false;
                    break;
                case 'custom_flower':
                    const customFlowerData = data?.customItems?.flowers?.[item.id];
                    equipped = customFlowerData?.equipped || false;
                    owned = customFlowerData?.owned || false;
                    break;
                case 'custom_tactic':
                    const customTacticData = data?.customItems?.tactics?.[item.id];
                    equipped = customTacticData?.equipped || false;
                    owned = customTacticData?.owned || false;
                    break;
                case 'custom_asura':
                    const customAsuraData = data?.customItems?.asura?.[item.id];
                    equipped = customAsuraData?.checked || false;
                    owned = equipped;
                    break;
            }
            return { equipped, owned };
        }

        function runComparison() {
            if (selectedUsers.length < 2) {
                showToast('2人以上のユーザーを選択してください', 'error');
                return;
            }

            const usersData = selectedUsers.map(name => ({ name, data: gameData[name] }));
            const equippableItems = getEquippableItems();

            const equipped = [];
            const unused = [];
            const ownedNotEquipped = [];

            equippableItems.forEach(item => {
                const equippedBy = [];
                const ownedBy = [];
                const ownedButNotEquippedUsers = [];

                usersData.forEach(({ name, data }) => {
                    const status = getItemStatus(data, item);
                    if (status.equipped) {
                        equippedBy.push(name);
                    }
                    if (status.owned) {
                        ownedBy.push(name);
                        if (!status.equipped) {
                            ownedButNotEquippedUsers.push(name);
                        }
                    }
                });

                if (equippedBy.length >= 1) {
                    equipped.push({ ...item, users: equippedBy });
                }

                if (equippedBy.length === 0) {
                    unused.push({ ...item, ownedBy: ownedBy });
                }

                if (ownedButNotEquippedUsers.length > 0) {
                    ownedNotEquipped.push({ ...item, users: ownedButNotEquippedUsers });
                }
            });

            // Add horse analysis
            const horseAnalysis = analyzeHorseSkills(usersData);
            if (horseAnalysis.overlaps.length > 0) {
                horseAnalysis.overlaps.forEach(item => equipped.push(item));
            }

            displayComparisonResults(equipped, unused, ownedNotEquipped);
        }

        function analyzeHorseSkills(usersData) {
            const overlaps = [];
            const horseTypes = [
                { key: 'kago', name: '駒・加護', type: 'ダメージ減' },
                { key: 'kobu', name: '駒・鼓舞', type: 'ダメージ増' },
                { key: 'hangeki', name: '駒・反撃', type: 'ダメージ跳ね返し' }
            ];
            horseTypes.forEach(horseType => {
                const usersWithSkill = [];
                usersData.forEach(({ name, data }) => {
                    const horseData = data?.horse?.[horseType.key];
                    const gold = parseInt(horseData?.gold) || 0;
                    const silver = parseInt(horseData?.silver) || 0;
                    if (gold > 0 || silver > 0) {
                        usersWithSkill.push({ user: name, gold, silver });
                    }
                });
                if (usersWithSkill.length > 1) {
                    const totalGold = usersWithSkill.reduce((sum, u) => sum + u.gold, 0);
                    const totalSilver = usersWithSkill.reduce((sum, u) => sum + u.silver, 0);
                    overlaps.push({
                        name: `${horseType.name}（金計${totalGold} / 銀計${totalSilver}）`,
                        type: horseType.type, category: 'horse', details: usersWithSkill
                    });
                }
            });
            return { overlaps };
        }

        const categoryStyles = {
            'weapon': { class: 'subcat-weapon', label: '① 兵器', icon: '⚔️', order: 1 },
            'spgeneral': { class: 'subcat-spgeneral', label: '②-1 SP武将', icon: '👑', order: 2 },
            'general': { class: 'subcat-general', label: '②-2 武将', icon: '🎖️', order: 3, hasSubcategory: true },
            'academy': { class: 'subcat-academy', label: '③ 極伝兵法', icon: '📚', order: 4 },
            'asura': { class: 'subcat-asura', label: '④ 阿修羅', icon: '👹', order: 5, hasSubcategory: true },
            'mask': { class: 'subcat-mask', label: '⑤ 核心具足', icon: '🎭', order: 6 },
            'flower': { class: 'subcat-flower', label: '⑥ 花陣', icon: '🌸', order: 7 },
            'horse': { class: 'subcat-horse', label: '⑦ 軍馬', icon: '🐴', order: 8 },
            'tactic': { class: 'subcat-tactic', label: '⑧ 戦法', icon: '📜', order: 9 },
            'custom_weapon': { class: 'subcat-weapon', label: '① 兵器(カスタム)', icon: '⚔️', order: 10 },
            'custom_academy': { class: 'subcat-academy', label: '③ 極伝兵法(カスタム)', icon: '📚', order: 10.5 },
            'custom_mask': { class: 'subcat-mask', label: '⑤ 核心具足(カスタム)', icon: '🎭', order: 11 },
            'custom_flower': { class: 'subcat-flower', label: '⑥ 花陣(カスタム)', icon: '🌸', order: 12 },
            'custom_asura': { class: 'subcat-asura', label: '④ 阿修羅(カスタム)', icon: '👹', order: 13 },
            'custom_tactic': { class: 'subcat-tactic', label: '⑧ 戦法(カスタム)', icon: '📜', order: 14 }
        };

        const asuraSubcatLabels = { 'asura30': '阿修羅30', 'asura60': '阿修羅60', 'asura90': '阿修羅90' };

        function displayComparisonResults(overlaps, unused, ownedNotEquipped) {
            const resultsDiv = document.getElementById('comparisonResults');
            resultsDiv.classList.add('show');

            const generalSubcatLabels = {};
            generalCategories.forEach(cat => { generalSubcatLabels[cat.title] = cat.title; });
            generalSubcatLabels['追加武将'] = '追加武将';

            function groupByCategory(items) {
                const groups = {};
                items.forEach(item => {
                    const cat = item.category;
                    if (!groups[cat]) groups[cat] = [];
                    groups[cat].push(item);
                });
                return groups;
            }

            function groupBySubcategory(items) {
                const groups = {};
                items.forEach(item => {
                    const subcat = item.subcategory || 'default';
                    if (!groups[subcat]) groups[subcat] = [];
                    groups[subcat].push(item);
                });
                return groups;
            }

            function sortCategories(groups) {
                return Object.entries(groups).sort((a, b) => {
                    const orderA = categoryStyles[a[0]]?.order || 99;
                    const orderB = categoryStyles[b[0]]?.order || 99;
                    return orderA - orderB;
                });
            }

            function renderItem(item) {
                if (item.category === 'horse') {
                    return `<div class="comparison-item"><div><span class="item-name">${escapeHtml(item.name)}</span><span class="item-type">${escapeHtml(item.type)}</span></div><div class="users-list">${item.details.map(d => `<span class="user-tag">${escapeHtml(d.user)}: 金${d.gold} 銀${d.silver}</span>`).join('')}</div></div>`;
                }
                if (item.users) {
                    return `<div class="comparison-item"><div><span class="item-name">${escapeHtml(item.name)}</span><span class="item-type">${escapeHtml(item.type)}</span></div><div class="users-list">${item.users.map(u => `<span class="user-tag">${escapeHtml(u)}</span>`).join('')}</div></div>`;
                }
                if (item.ownedBy !== undefined) {
                    return `<div class="comparison-item"><div><span class="item-name">${escapeHtml(item.name)}</span><span class="item-type">${escapeHtml(item.type)}</span></div><div class="users-list">${item.ownedBy.length > 0 ? item.ownedBy.map(u => `<span class="user-tag">${escapeHtml(u)}(所持)</span>`).join('') : '<span style="color: var(--text-muted); font-size: 0.8rem;">誰も所持していません</span>'}</div></div>`;
                }
                return '';
            }

            function renderLevel3(items) { return items.map(renderItem).join(''); }

            function renderLevel2(cat, items, style) {
                const subcatGroups = groupBySubcategory(items);
                if (style.hasSubcategory && Object.keys(subcatGroups).length > 0) {
                    const subcatLabels = cat === 'general' ? generalSubcatLabels : asuraSubcatLabels;
                    let sortedSubcats;
                    if (cat === 'general') {
                        sortedSubcats = Object.entries(subcatGroups).sort((a, b) => {
                            const indexA = items.find(i => i.subcategory === a[0])?.subcategoryIndex ?? 99;
                            const indexB = items.find(i => i.subcategory === b[0])?.subcategoryIndex ?? 99;
                            return indexA - indexB;
                        });
                    } else {
                        const asuraOrder = { 'asura30': 1, 'asura60': 2, 'asura90': 3 };
                        sortedSubcats = Object.entries(subcatGroups).sort((a, b) => (asuraOrder[a[0]] || 99) - (asuraOrder[b[0]] || 99));
                    }
                    return sortedSubcats.map(([subcat, subItems]) => {
                        const subcatId = `subcat2_${cat}_${subcat}_${Math.random().toString(36).substr(2, 9)}`;
                        const label = subcatLabels[subcat] || subcat;
                        return `<div class="comparison-level-2"><div class="comparison-subcategory-header" style="padding: 0.5rem 0.8rem; font-size: 0.85rem;" onclick="toggleSubcategory('${subcatId}')"><span class="subcat-title"><span>●</span>${escapeHtml(label)}<span class="subcat-count">${subItems.length}件</span></span><span class="toggle-icon">▶</span></div><div class="comparison-subcategory-content comparison-level-3" id="${subcatId}">${renderLevel3(subItems)}</div></div>`;
                    }).join('');
                }
                return renderLevel3(items);
            }

            function renderSubcategories(groups) {
                if (Object.keys(groups).length === 0) return '<div class="no-issues"><div class="icon">✓</div>該当なし</div>';
                const sortedGroups = sortCategories(groups);
                return sortedGroups.map(([cat, items]) => {
                    const style = categoryStyles[cat] || { class: '', label: cat, icon: '📋', order: 99 };
                    const subcatId = `subcat_${cat}_${Math.random().toString(36).substr(2, 9)}`;
                    return `<div class="comparison-subcategory"><div class="comparison-subcategory-header ${style.class}" onclick="toggleSubcategory('${subcatId}')"><span class="subcat-title"><span>${style.icon}</span>${style.label}<span class="subcat-count">${items.length}件</span></span><span class="toggle-icon">▶</span></div><div class="comparison-subcategory-content" id="${subcatId}">${renderLevel2(cat, items, style)}</div></div>`;
                }).join('');
            }

            const overlapGroups = groupByCategory(overlaps);
            document.getElementById('overlapCount').textContent = `${overlaps.length}件`;
            document.getElementById('overlapContent').innerHTML = renderSubcategories(overlapGroups);

            const unusedGroups = groupByCategory(unused);
            document.getElementById('unusedCount').textContent = `${unused.length}件`;
            document.getElementById('unusedContent').innerHTML = renderSubcategories(unusedGroups);

            const ownedNotEquippedGroups = groupByCategory(ownedNotEquipped);
            document.getElementById('inconsistentCount').textContent = `${ownedNotEquipped.length}件`;
            document.getElementById('inconsistentContent').innerHTML = renderSubcategories(ownedNotEquippedGroups);

            showToast('比較分析が完了しました', 'success');
        }

        function toggleSubcategory(subcatId) {
            const content = document.getElementById(subcatId);
            const header = content.previousElementSibling;
            const icon = header.querySelector('.toggle-icon');
            if (content.classList.contains('show')) {
                content.classList.remove('show');
                icon.textContent = '▶';
            } else {
                content.classList.add('show');
                icon.textContent = '▼';
            }
        }

        function toggleComparisonCategory(categoryId) {
            const content = document.querySelector(`#${categoryId} .comparison-category-content`);
            const header = document.querySelector(`#${categoryId} .comparison-category-header`);
            const icon = header.querySelector('.toggle-icon');
            if (content.classList.contains('show')) {
                content.classList.remove('show');
                icon.textContent = '▶';
            } else {
                content.classList.add('show');
                icon.textContent = '▼';
            }
        }

        // Init
        document.addEventListener('firebaseReady', async () => {
            await loadAllData();
            subscribeRealtime();
        });

        document.getElementById('teamFilter').addEventListener('change', renderPreview);

        // Fallback if firebaseReady already fired
        if (window.firebaseReady) {
            loadAllData().then(subscribeRealtime);
        }
    </script>

    <div class="toast" id="toast"></div>
</body>
</html>
