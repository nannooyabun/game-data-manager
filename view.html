                    { label: '← メニューに戻る', action: 'main' }
                ]
            },
            reset: {
                message: '🔄 リセット方法:\n\n集結検討モードの内容をリセットするには:\n\n• 「編集をリセット」→ セル編集のみリセット\n• 「仮想メンバーをクリア」→ 追加メンバーを削除\n\n両方を一度にリセットしたい場合は、両方のボタンを押してください。',
                options: [
                    { label: '🔄 集結検討モード', action: 'simulation' },
                    { label: '← メニューに戻る', action: 'main' }
                ]
            },
            compare: {
                message: '👥 比較分析機能:\n\n画面下部の「比較分析」セクションで:\n1. 比較したいユーザーを2人以上選択\n2. 「比較分析を実行」をクリック\n\n選択ユーザーの装備状況を比較できます。\nチーム全員を一括選択することも可能です。',
                options: [
                    { label: '📊 表の見方', action: 'table' },
                    { label: '← メニューに戻る', action: 'main' }
                ]
            },
            back: {
                message: '📝 入力画面への戻り方:\n\n画面上部の「← 入力画面へ戻る」リンクをクリックすると、データ入力画面(index.html)に移動できます。',
                options: [
                    { label: '← メニューに戻る', action: 'main' }
                ]
            }
        };

        let helpInitialized = false;

        function openHelpChat() {
            document.getElementById('helpChatOverlay').classList.add('show');
            document.getElementById('helpChat').classList.add('show');
            // Show initial content only on first open
            if (!helpInitialized) {
                helpInitialized = true;
                showHelpContent('main');
            }
        }

        function closeHelpChat() {
            document.getElementById('helpChatOverlay').classList.remove('show');
            document.getElementById('helpChat').classList.remove('show');
        }

        function resetHelpChat() {
            showHelpContent('main');
        }

        function showHelpContent(action) {
            const data = helpData[action];
            if (!data) return;

            const body = document.getElementById('helpChatBody');
            let html = `<div class="help-chat-message"><span class="bot-icon">🤖</span>${data.message.replace(/\n/g, '<br>')}</div>`;

            if (data.options && data.options.length > 0) {
                html += '<div class="help-chat-options">';
                data.options.forEach(opt => {
                    html += `<button class="help-chat-option" onclick="showHelpContent('${opt.action}')">${opt.label}</button>`;
                });
                html += '</div>';
            }

            body.innerHTML = html;
            body.scrollTop = 0;
        }

        function sendHelpQuestion() {
            const input = document.getElementById('helpChatInput');
            const query = (input.value || '').toLowerCase().trim();
            if (!query) return;
            input.value = '';

            const keywords = {
                '表': 'table', '見方': 'table', '記号': 'table',
                'フィルタ': 'filter', 'チーム': 'filter', '絞り込み': 'filter',
                '編集': 'edit', 'セル': 'edit', '変更': 'edit', 'クリック': 'edit',
                '集結': 'simulation', '検討': 'simulation', 'シミュレーション': 'simulation',
                '仮想': 'virtual', 'メンバー追加': 'virtual',
                'リセット': 'reset', 'クリア': 'reset',
                '比較': 'compare', '分析': 'compare',
                '入力': 'back', '戻る': 'back'
            };

            let matched = 'main';
            for (const [kw, action] of Object.entries(keywords)) {
                if (query.includes(kw)) {
                    matched = action;
                    break;
                }
            }

            showHelpContent(matched);
        }

        // ========== Excel Export ==========
        // Category color mapping (RGB hex without #)
        const categoryColors = {
            'cat-basic': 'E8E8E8',     // Gray for basic info
            'cat-weapon': 'FFE4E1',    // Light red/pink for weapons
            'cat-sp': 'FFFACD',        // Light yellow for SP generals
            'cat-general': 'E6F3FF',   // Light blue for generals
            'cat-academy': 'E8F5E9',   // Light green for academy
            'cat-asura': 'FFF3E0',     // Light orange for asura
            'cat-armor': 'F3E5F5',     // Light purple for armor
            'cat-flower': 'FCE4EC',    // Light pink for flowers
            'cat-tactic': 'E0F7FA'     // Light cyan for tactics
        };

        async function exportToExcel() {
            // Load xlsx-style for styling support
            if (typeof XLSX === 'undefined') {
                await new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.src = 'https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js';
                    script.onload = resolve;
                    script.onerror = () => {
                        // Fallback to standard SheetJS
                        const fallback = document.createElement('script');
                        fallback.src = 'https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js';
                        fallback.onload = resolve;
                        fallback.onerror = reject;
                        document.head.appendChild(fallback);
                    };
                    document.head.appendChild(script);
                });
            }

            showToast('Excel出力中...');

            try {
                // Get all categories
                const allCategories = getAllCategories();

                // Get entries using same logic as table view
                const teamFilterValue = document.getElementById('teamFilter').value;
                let entriesToExport = [];

                // Get all visible entries (properly handles multi-team format)
                const allEntries = getVisibleEntries();

                if (teamFilterValue === '__all__') {
                    entriesToExport = allEntries;
                } else {
                    // Filter by selected team's members
                    const team = Object.values(teams || {}).find(t => t.id === teamFilterValue);
                    if (team && team.members) {
                        const memberSet = new Set(team.members);
                        entriesToExport = allEntries.filter(e => memberSet.has(e.username));
                    }
                }

                // Convert entries to user objects for export (with name and team info)
                const usersToExport = entriesToExport.map(e => ({
                    name: e.team && e.team !== '1軍' ? `${e.username} (${e.team})` : e.username,
                    ...e.data
                }));

                if (usersToExport.length === 0) {
                    showToast('エクスポートするデータがありません');
                    return;
                }

                // Build Excel data with cell info for styling
                const rows = [];
                const cellStyles = {}; // Track cell styles: { "A1": { state, colorClass }, ... }
                const columnCategories = [null]; // Track category colorClass for each column (index 0 = user name column)

                // Row 1: Category titles (will need merge info)
                const categoryRow = [''];
                const mergeRanges = [];
                let colIndex = 1;

                for (const cat of allCategories) {
                    if (!cat.items || cat.items.length === 0) continue;
                    const startCol = colIndex;
                    for (let i = 0; i < cat.items.length; i++) {
                        categoryRow.push(i === 0 ? cat.title : '');
                        columnCategories.push(cat.colorClass || 'cat-general');
                        colIndex++;
                    }
                    if (cat.items.length > 1) {
                        mergeRanges.push({ s: { r: 0, c: startCol }, e: { r: 0, c: colIndex - 1 } });
                    }
                }
                rows.push(categoryRow);

                // Row 2: Item names with rallyLimit info
                const itemRow = ['ユーザー名'];
                for (const cat of allCategories) {
                    if (!cat.items || cat.items.length === 0) continue;
                    for (const item of cat.items) {
                        let name = item.name || item.id;
                        // Add rally limit for generals if available
                        if (item.rallyLimit) {
                            name += `(${item.rallyLimit})`;
                        }
                        itemRow.push(name);
                    }
                }
                rows.push(itemRow);

                // Row 3: Notes (category notes + individual item notes)
                const notesRow = ['備考'];
                let hasAnyNotes = false;
                for (const cat of allCategories) {
                    if (!cat.items || cat.items.length === 0) continue;
                    for (const item of cat.items) {
                        let note = '';
                        // Check for category-level notes
                        if (cat.categoryNotes) {
                            note = cat.categoryNotes;
                            hasAnyNotes = true;
                        }
                        // Check for item-level notes (generals)
                        if (item.notes) {
                            note = note ? `${note} / ${item.notes}` : item.notes;
                            hasAnyNotes = true;
                        }
                        notesRow.push(note);
                    }
                }
                if (hasAnyNotes) {
                    rows.push(notesRow);
                }

                const dataStartRow = rows.length; // Track where data rows start

                // Data rows
                for (const user of usersToExport) {
                    const dataRow = [user.name];
                    let colIdx = 1;

                    for (const cat of allCategories) {
                        if (!cat.items || cat.items.length === 0) continue;
                        for (const item of cat.items) {
                            let cellValue = '';
                            let cellState = 'none';

                            // Get cell state and value
                            if (cat.isTextCategory && cat.getCellText) {
                                cellValue = cat.getCellText(user, item) || '';
                                cellState = 'text';
                            } else {
                                const state = cat.getCellState ? cat.getCellState(user, item) : 'none';
                                const value = cat.getCellValue ? cat.getCellValue(user, item) : null;
                                cellState = state;

                                if (state === 'equipped') {
                                    cellValue = value ? `◎${value}` : '◎';
                                } else if (state === 'owned') {
                                    cellValue = value ? `○${value}` : '○';
                                } else {
                                    cellValue = '';
                                }
                            }
                            dataRow.push(cellValue);

                            // Track style for this cell (state + category color)
                            const cellRef = XLSX.utils.encode_cell({ r: rows.length, c: colIdx });
                            cellStyles[cellRef] = { state: cellState, colorClass: cat.colorClass || 'cat-general' };
                            colIdx++;
                        }
                    }
                    rows.push(dataRow);
                }

                // Add legend at the bottom
                rows.push([]);
                rows.push(['凡例:', '◎ = 装備/編成中', '○ = 所持', '（空欄）= 未所持']);
                rows.push(['', '数値は: 兵器=段階/改造, SP武将=主義Lv/スキルLv/副将段階, 武将=守護霊Lv']);

                // Create workbook
                const wb = XLSX.utils.book_new();
                const ws = XLSX.utils.aoa_to_sheet(rows);

                // Apply merges for category row
                ws['!merges'] = mergeRanges;

                // Apply cell styles (background colors based on state and category)
                for (const [cellRef, styleInfo] of Object.entries(cellStyles)) {
                    if (!ws[cellRef]) continue;
                    const { state, colorClass } = styleInfo;

                    if (state === 'equipped') {
                        ws[cellRef].s = {
                            fill: { patternType: 'solid', fgColor: { rgb: "90EE90" } },
                            font: { bold: true },
                            alignment: { horizontal: 'center' }
                        };
                    } else if (state === 'owned') {
                        ws[cellRef].s = {
                            fill: { patternType: 'solid', fgColor: { rgb: "FFFACD" } },
                            alignment: { horizontal: 'center' }
                        };
                    } else if (state === 'text') {
                        // Text cells use category color
                        const bgColor = categoryColors[colorClass] || 'FFFFFF';
                        ws[cellRef].s = {
                            fill: { patternType: 'solid', fgColor: { rgb: bgColor } },
                            alignment: { horizontal: 'center' }
                        };
                    } else {
                        // Empty cells - light gray
                        ws[cellRef].s = {
                            fill: { patternType: 'solid', fgColor: { rgb: "F5F5F5" } },
                            alignment: { horizontal: 'center' }
                        };
                    }
                }

                // Style header rows with category colors
                for (let c = 0; c < categoryRow.length; c++) {
                    const colorClass = columnCategories[c];
                    const bgColor = colorClass ? (categoryColors[colorClass] || 'E0E0E0') : 'E0E0E0';

                    // Category title row
                    const cell1 = XLSX.utils.encode_cell({ r: 0, c });
                    if (ws[cell1]) {
                        ws[cell1].s = {
                            fill: { patternType: 'solid', fgColor: { rgb: bgColor } },
                            font: { bold: true, sz: 11 },
                            alignment: { horizontal: 'center', vertical: 'center' },
                            border: { bottom: { style: 'thin', color: { rgb: '999999' } } }
                        };
                    }

                    // Item name row
                    const cell2 = XLSX.utils.encode_cell({ r: 1, c });
                    if (ws[cell2]) {
                        ws[cell2].s = {
                            fill: { patternType: 'solid', fgColor: { rgb: bgColor } },
                            font: { bold: true, sz: 10 },
                            alignment: { horizontal: 'center', vertical: 'center' },
                            border: { bottom: { style: 'thin', color: { rgb: '999999' } } }
                        };
                    }

                    // Notes row (if exists)
                    if (hasAnyNotes) {
                        const cell3 = XLSX.utils.encode_cell({ r: 2, c });
                        if (ws[cell3]) {
                            ws[cell3].s = {
                                fill: { patternType: 'solid', fgColor: { rgb: 'FAFAFA' } },
                                font: { sz: 9, color: { rgb: '666666' } },
                                alignment: { horizontal: 'center' }
                            };
                        }
                    }
                }

                // Set column widths
                const colWidths = [{ wch: 12 }]; // User name column
                for (const cat of allCategories) {
                    if (!cat.items || cat.items.length === 0) continue;
                    for (const item of cat.items) {
                        const name = item.name || item.id;
                        const width = Math.max(5, Math.min(12, name.length * 1.5 + 2));
                        colWidths.push({ wch: width });
                    }
                }
                ws['!cols'] = colWidths;

                // Freeze first column and header rows
                ws['!freeze'] = { xSplit: 1, ySplit: hasAnyNotes ? 3 : 2 };

                XLSX.utils.book_append_sheet(wb, ws, 'データ一覧');

                // Generate filename with date and team name
                const now = new Date();
                const dateStr = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
                let teamName = '';
                if (teamFilterValue !== '__all__') {
                    const team = Object.values(teams || {}).find(t => t.id === teamFilterValue);
                    teamName = team?.name ? `_${team.name}` : '';
                }
                const filename = `武将データ_${dateStr}${teamName}.xlsx`;

                // Download
                XLSX.writeFile(wb, filename);
                showToast('Excel出力完了');

            } catch (error) {
                console.error('Excel export error:', error);
                showToast('Excel出力に失敗しました');
            }
        }
    </script>

    <div class="toast" id="toast"></div>

    <!-- Help Button -->
    <button class="help-btn-float" onclick="openHelpChat()">❓ ヘルプ</button>

    <!-- Help Chat Modal -->
    <div class="help-chat-overlay" id="helpChatOverlay" onclick="closeHelpChat()"></div>
    <div class="help-chat" id="helpChat">
        <div class="help-chat-header">
            <h4>💬 ヘルプ</h4>
            <button class="help-chat-close" onclick="closeHelpChat()">×</button>
        </div>
        <div class="help-chat-body" id="helpChatBody"></div>
        <div class="help-chat-footer">
            <input type="text" class="help-chat-input" id="helpChatInput" placeholder="質問を入力..." onkeypress="if(event.key==='Enter')sendHelpQuestion()">
            <button class="help-chat-send" onclick="sendHelpQuestion()">送信</button>
        </div>
    </div>
</body>
</html>
